databases:
  # ── DATABASE ──────────────────────────────────────────────────────────────
  - name: trustlens-db
    databaseName: trustlens
    user: trustlens
    plan: free

services:
  # ── REDIS (For Celery) ────────────────────────────────────────────────────
  - type: redis
    name: trustlens-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

  # ── BACKEND (FastAPI API) ─────────────────────────────────────────────────
  - type: web
    name: trustlens-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString

  # ── WORKER (Celery Background Processor) ──────────────────────────────────
  - type: worker
    name: trustlens-worker
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.worker.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: trustlens-redis
          property: connectionString

  # ── FRONTEND (Streamlit Dashboard) ────────────────────────────────────────
  - type: web
    name: trustlens-dashboard
    runtime: python
    rootDir: frontend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: trustlens-api
          property: host
